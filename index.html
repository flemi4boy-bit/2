<script>
// ===== имя + пол =====
const params = new URLSearchParams(window.location.search);
let fullName = params.get("name");
let gender = params.get("gender");

if (!fullName) {
  document.getElementById("guestName").innerText = "Дорогой гость!";
} else {

  let firstName = fullName.split(" ")[0].toLowerCase();

  // база имен (расширь при необходимости)
  const femaleNames = [
    "анна","мария","эльвина","айгуль","диана","алина","карина","мадина",
    "сабина","лилия","наиля","зара","камилла","фатима","гульнара",
    "шахноза","нигора","феруза","дильноза","умеда"
  ];

  const maleNames = [
    "руслан","азиз","бекзод","али","тимур","ислам","сарвар","жасур",
    "шохрух","абдулла","илхом","акмал","санжар","бахром","умид","фаррух"
  ];

  // если не передан gender — определяем
  if (!gender) {
    if (femaleNames.includes(firstName)) {
      gender = "female";
    } else if (maleNames.includes(firstName)) {
      gender = "male";
    } else {
      // fallback
      gender = firstName.endsWith("а") ? "female" : "male";
    }
  }

  const prefix = gender === "female" ? "Дорогая" : "Дорогой";

  document.getElementById("guestName").innerText =
    `${prefix} ${fullName}!`;
}

// ===== переход =====
function openInvite() {
  document.getElementById("wrapper").style.transform = "translateY(-100vh)";
}
function closeInvite() {
  document.getElementById("wrapper").style.transform = "translateY(0)";
}

// ===== таймер =====
const weddingDate = new Date("2026-04-26T17:30:00").getTime();
const timerEl = document.getElementById("timer");

setInterval(() => {
  const now = new Date().getTime();
  const diff = weddingDate - now;

  if (diff <= 0) {
    timerEl.innerText = "Сегодня день свадьбы";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);

  timerEl.innerText = `До свадьбы: ${days} дней ${hours} часов`;
}, 1000);
</script>
