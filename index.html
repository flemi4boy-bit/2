<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Руслан & Эльвина</title>

<meta property="og:title" content="Свадьба Руслана и Эльвины">
<meta property="og:description" content="Приглашение на торжество • 26 апреля 2026 • г. Ангрен">
<meta property="og:image" content="https://USERNAME.github.io/REPO/preview.jpg">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 20% 20%, #fdfaf6, #e7ded5);
  overflow-x: hidden;
  overflow-y: auto;
}

.wrapper {
  width: 100%;
  height: 200vh;
  will-change: transform;
}

.screen {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px 0;
}

.content {
  width: 92%;
  max-width: 380px;
  min-height: 520px;

  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.35);

  border-radius: 32px;
  border: 1px solid rgba(255,255,255,0.4);

  box-shadow: 0 25px 70px rgba(0,0,0,0.18);

  padding: 36px 20px;

  display: flex;
  flex-direction: column;
  justify-content: space-between;

  text-align: center;
}

.names {
  font-family: 'Playfair Display', serif;
  font-size: 46px;
}

.date {
  font-size: 24px;
  opacity: 0;
  transform: translateY(20px);
  animation: fade 1.2s forwards;
  animation-delay: 0.6s;
}

@keyframes fade {
  to {opacity:1; transform:translateY(0);}
}

.button {
  padding: 14px;
  border-radius: 24px;
  border: none;
  background: linear-gradient(135deg, #d6b98c, #f3e2c7);
  cursor: pointer;
}

.timer { margin-top:10px; }

@media (max-height:700px){
  .content{transform:scale(.9);}
}
</style>
</head>

<body>

<div class="wrapper" id="wrapper">

<div class="screen">
<div class="content">
<div class="names">РУСЛАН<br>&<br>ЭЛЬВИНА</div>
<div class="date">26 апреля 2026</div>
<button class="button" onclick="openInvite()">Открыть приглашение</button>
</div>
</div>

<div class="screen">
<div class="content">
<div class="names">РУСЛАН & ЭЛЬВИНА</div>
<div id="guestName"></div>

<div>
С большой радостью приглашаем вас разделить с нами день нашей свадьбы.
</div>

<div><b>26 апреля 2026</b></div>
<div>Сбор гостей: 17:30</div>
<div>Начало: 18:00</div>
<div>г. Ангрен</div>

<div class="timer" id="timer"></div>

<button class="button" onclick="closeInvite()">Назад</button>
</div>
</div>

</div>

<script>
// ===== свайп =====
let startY=0, current=0;
const wrapper=document.getElementById("wrapper");

document.addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
});

document.addEventListener("touchmove",e=>{
  let diff=e.touches[0].clientY-startY;
  current=Math.max(Math.min(diff,0),-window.innerHeight);
  wrapper.style.transform=`translateY(${current}px)`;
});

document.addEventListener("touchend",()=>{
  if(current<-window.innerHeight/3){
    openInvite();
  }else{
    closeInvite();
  }
});

// ===== кнопки =====
function openInvite(){
  wrapper.style.transform=`translateY(-${window.innerHeight}px)`;
}
function closeInvite(){
  wrapper.style.transform=`translateY(0)`;
}

// ===== имя =====
const params=new URLSearchParams(window.location.search);
let full=params.get("name");
const el=document.getElementById("guestName");

if(full){
  full=decodeURIComponent(full);
  const parts=full.split(" ");
  el.innerText=parts.length>1
    ? `Дорогие ${parts.join(" и ")}!`
    : `Дорогой ${full}!`;
}else{
  el.innerText="Дорогой гость!";
}

// ===== таймер =====
const end=new Date("2026-04-26T17:30:00").getTime();
setInterval(()=>{
  let d=end-Date.now();
  let days=Math.floor(d/86400000);
  let hours=Math.floor(d/3600000)%24;
  document.getElementById("timer").innerText=
    `До свадьбы: ${days} дней ${hours} часов`;
},1000);
</script>

</body>
</html>
