<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Руслан & Эльвина</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 20% 20%, #fdfaf6, #e7ded5);
  overflow: hidden;
}

/* мягкое свечение */
body::before, body::after {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(255,215,160,0.25), transparent 70%);
  filter: blur(80px);
  z-index: 0;
}

body::before { top: -100px; left: -100px; }
body::after { bottom: -100px; right: -100px; }

/* частицы */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* экран */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2;
  transition: 1s;
}

.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(30px);
}

/* СТЕКЛЯННАЯ КАРТОЧКА */
.content {
  backdrop-filter: blur(25px) saturate(140%);
  -webkit-backdrop-filter: blur(25px) saturate(140%);
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.35),
    rgba(255,255,255,0.15)
  );
  border-radius: 28px;
  padding: 45px 30px;
  width: 320px;

  border: 1px solid rgba(255,255,255,0.4);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.15),
    inset 0 0 30px rgba(255,255,255,0.3);

  text-align: center;
  animation: fadeUp 1.5s ease;
}

/* имена */
.names {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  letter-spacing: 3px;
}

/* заголовок */
.title {
  margin-top: 10px;
  font-size: 16px;
  opacity: 0.7;
}

/* имя гостя */
.guest {
  margin: 20px 0;
  font-size: 20px;
}

/* детали */
.details {
  font-size: 18px;
  line-height: 1.6;
}

/* кнопка */
.button {
  margin-top: 25px;
  padding: 12px 26px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, #d6b98c, #f3e2c7);
  cursor: pointer;
  transition: 0.3s;
}

.button:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* анимация */
@keyframes fadeUp {
  from {opacity:0; transform: translateY(30px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- экран 1 -->
<div class="screen" id="screen1">
  <div class="content">
    <div class="names">РУСЛАН & ЭЛЬВИНА</div>
    <div class="title">приглашают на свадьбу 💍</div>
    <div class="guest" id="guestName"></div>

    <div class="details">
      26 апреля 2026<br>
      г. Ангрен
    </div>

    <button class="button" onclick="nextScreen()">Открыть детали</button>
  </div>
</div>

<!-- экран 2 -->
<div class="screen hidden" id="screen2">
  <div class="content">
    <div class="names">Тайминг дня</div>

    <div class="details">
      16:00 — Сбор гостей<br>
      17:00 — Церемония<br>
      18:00 — Ужин<br>
      20:00 — Танцы 🎉
    </div>

    <button class="button" onclick="back()">Назад</button>
  </div>
</div>

<!-- музыка -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b5d7.mp3" type="audio/mpeg">
</audio>

<script>
// ===== имя + пол =====
const params = new URLSearchParams(window.location.search);
let fullName = params.get("name");
let gender = params.get("gender");

if (!fullName) {
  document.getElementById("guestName").innerText = "Дорогой гость!";
} else {
  let firstName = fullName.split(" ")[0].toLowerCase();

  const femaleNames = ["анна","мария","эльвина","айгуль","диана","алина","карина","мадина","сабина","лилия","наиля","зара","камилла","фатима"];
  const maleNames = ["руслан","азиз","бекзод","али","тимур","ислам","сарвар","жасур","шохрух","абдулла","илхом","акмал"];

  if (!gender) {
    if (femaleNames.includes(firstName)) gender = "female";
    else if (maleNames.includes(firstName)) gender = "male";
    else gender = firstName.endsWith("а") ? "female" : "male";
  }

  const prefix = gender === "female" ? "Дорогая" : "Дорогой";
  document.getElementById("guestName").innerText = `${prefix} ${fullName}!`;
}

// ===== музыка =====
document.body.addEventListener("click", () => {
  document.getElementById("music").play();
}, { once: true });

// ===== экраны =====
function nextScreen() {
  document.getElementById("screen1").classList.add("hidden");
  document.getElementById("screen2").classList.remove("hidden");
}

function back() {
  document.getElementById("screen2").classList.add("hidden");
  document.getElementById("screen1").classList.remove("hidden");
}

// ===== частицы =====
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 70; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 1,
    dx: Math.random() * 0.3,
    dy: Math.random() * 0.3
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "rgba(255,255,255,0.6)";
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x > canvas.width) p.x = 0;
    if (p.y > canvas.height) p.y = 0;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
