<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Свадьба Руслана и Эльвины</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f6f1e8 url('https://www.transparenttextures.com/patterns/paper-fibers.png');overflow:hidden;}
.wrapper{height:100vh;position:relative;}

.screen{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;transition:.8s cubic-bezier(.22,1,.36,1);} 
.wrapper.dragging .screen{transition:none;}
.screen1{transform:translateY(0);} 
.screen2{transform:translateY(100%);opacity:0;} 
.wrapper.open .screen1{transform:translateY(-100%);opacity:0;} 
.wrapper.open .screen2{transform:translateY(0);opacity:1;} 

.content{width:92%;max-width:480px;padding:60px 30px;background:linear-gradient(180deg,#ffffff,#f7f3ec);border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,0.1);display:flex;flex-direction:column;gap:26px;text-align:center;}

.names{display:flex;flex-direction:column;gap:6px;}
.name{font-family:'Great Vibes';font-size:clamp(56px,7vw,80px);color:#b8965a;opacity:0;transition:1s cubic-bezier(.22,1,.36,1);} 
.left{transform:translateX(-80px);} 
.right{transform:translateX(80px);} 
.name.show{opacity:1;transform:translateX(0);} 

.amp{font-family:'Great Vibes';font-size:40px;color:#b8965a;opacity:0;transform:scale(.8);transition:.6s;} 
.amp.show{opacity:.8;transform:scale(1);} 

.divider{display:flex;align-items:center;justify-content:center;gap:10px;} 
.line{width:90px;height:1px;background:#b8965a;opacity:.5;} 
.dot{width:6px;height:6px;border-radius:50%;background:#b8965a;} 

.date{font-family:'Cormorant Garamond';font-size:24px;font-style:italic;color:#4a3b2a;} 
.date-letter{opacity:0;display:inline-block;transform:translateY(10px);} 

.button{padding:10px 22px;border-radius:999px;border:1px solid #b8965a;background:transparent;color:#4a3b2a;font-size:14px;cursor:pointer;width:fit-content;align-self:center;transition:.25s;} 
.button:hover{background:#b8965a;color:white;transform:translateY(-2px);} 
.button:active{transform:scale(.96);} 

.greeting{font-family:'Great Vibes';font-size:34px;color:#b8965a;} 

.block{font-family:'Cormorant Garamond';font-size:19px;font-weight:600;line-height:1.6;} 

.event-line{font-family:'Cormorant Garamond';font-size:20px;font-weight:600;line-height:1.8;} 

.schedule{
  font-family:'Cormorant Garamond';
  font-size:20px;
  font-weight:700;
  color:#b8965a;
  line-height:1.8;
}

/* НОВЫЙ ТАЙМЕР */
.timer{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-top:10px;
}

.timer-item{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.timer-num{
  font-family:'Cormorant Garamond';
  font-size:28px;
  color:#b8965a;
  letter-spacing:2px;
}

.timer-label{
  font-size:10px;
  opacity:.6;
  letter-spacing:2px;
}

.timer-sep{
  font-size:24px;
  opacity:.4;
  align-self:center;
}

.location-title{font-size:12px;letter-spacing:3px;opacity:.6;} 
.map{display:flex;gap:10px;justify-content:center;} 
.map button{padding:8px 14px;border-radius:999px;border:1px solid #b8965a;background:transparent;} 

.back{font-size:12px;opacity:.3;border:none;background:none;} 

.fade-block{opacity:0;transform:translateY(20px);transition:.8s;} 
.fade-block.show{opacity:1;transform:translateY(0);} 
</style>
</head>

<body>

<div class="wrapper" id="wrapper">

<div class="screen screen1">
<div class="content">

<div class="names">
  <span class="name left" id="name1">Руслан</span>
  <span class="amp" id="amp">&</span>
  <span class="name right" id="name2">Эльвина</span>
</div>

<div class="divider"><div class="line"></div><div class="dot"></div><div class="line"></div></div>

<div class="date" id="date" data-text="26 апреля 2026"></div>

<button class="button" onclick="openInvite()">Открыть приглашение</button>

</div>
</div>

<div class="screen screen2">
<div class="content">

<div id="guestName" class="greeting fade-block"></div>

<div class="block fade-block">
С большой радостью приглашаем Вас разделить с нами<br>
один из самых важных дней в нашей жизни — день,<br>
с которого начинается наша семейная история.
</div>

<div class="event-line fade-block">
26 апреля 2026
</div>

<div class="schedule fade-block">
Сбор гостей — 17:30<br>
Начало торжества — 18:00
</div>

<div class="block fade-block">Банкетный зал «OQ SAROY»<br>г. Ангрен</div>

<div class="timer fade-block" id="timer"></div>

<div class="location-title fade-block">Локация</div>

<div class="map fade-block">
<a href="https://yandex.uz/maps/101550/angren/?z=19"><button>Яндекс</button></a>
<a href="https://www.google.com/maps/place/40.9994792,70.0747963"><button>Google</button></a>
</div>

<button class="back fade-block" onclick="closeInvite()">назад</button>

</div>
</div>

</div>

<script>
const wrapper=document.getElementById("wrapper");
function openInvite(){wrapper.classList.add("open");}
function closeInvite(){wrapper.classList.remove("open");}

function animateNames(){name1.classList.add("show");name2.classList.add("show");setTimeout(()=>amp.classList.add("show"),500);} 

function animateDate(){
  const date=document.getElementById("date");
  const text=date.dataset.text;
  date.innerHTML="";
  text.split("").forEach((c,i)=>{
    const span=document.createElement("span");
    span.textContent=c;
    span.classList.add("date-letter");
    date.appendChild(span);
    setTimeout(()=>{span.style.opacity=1;span.style.transform="translateY(0)";},600+i*30);
  });
}

window.addEventListener("DOMContentLoaded",()=>{animateNames();animateDate();});

const params=new URLSearchParams(location.search);
let name=params.get("name");
document.getElementById("guestName").innerText=name
? `Дорогие ${decodeURIComponent(name).replace(" "," и ")}!`
: "Дорогой гость!";

const end=new Date("2026-04-26T17:30:00").getTime();
setInterval(()=>{
  let diff=end-Date.now();
  let d=Math.floor(diff/86400000);
  let h=Math.floor(diff/3600000)%24;
  let m=Math.floor(diff/60000)%60;

  document.getElementById("timer").innerHTML=`
  <div class="timer-item"><div class="timer-num">${d}</div><div class="timer-label">ДНЕЙ</div></div>
  <div class="timer-sep">:</div>
  <div class="timer-item"><div class="timer-num">${h}</div><div class="timer-label">ЧАСОВ</div></div>
  <div class="timer-sep">:</div>
  <div class="timer-item"><div class="timer-num">${m}</div><div class="timer-label">МИН</div></div>`;
},1000);

const obs=new IntersectionObserver(e=>{e.forEach(i=>i.isIntersecting&&i.target.classList.add("show"));});
document.querySelectorAll(".fade-block").forEach(el=>obs.observe(el));
</script>

</body>
</html>
