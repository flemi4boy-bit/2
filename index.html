<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Руслан & Эльвина | 26.04.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Montserrat', sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;
    background: linear-gradient(-45deg, #f3c5d7, #d6c3f9, #ffd6a5, #c3f0ff);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.section {
    min-height: 100vh;
    padding: 60px 25px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.names {
    font-family: 'Playfair Display', serif;
    font-size: 44px;
    letter-spacing: 4px;
    line-height: 1.4;
    text-shadow: 0 0 20px rgba(255,255,255,0.6);
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 2s ease forwards;
}

@keyframes fadeUp { to { opacity:1; transform:translateY(0);} }

.date {
    margin-top: 25px;
    font-size: 18px;
    letter-spacing: 3px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 2s forwards 1s;
}

@keyframes fadeIn { to { opacity:1; transform:translateY(0);} }

.button {
    margin-top: 40px;
    padding: 14px 35px;
    border: 1px solid white;
    background: transparent;
    color: white;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.4s;
}

.button:hover { background: white; color: #333; }

.fade {
    opacity:0;
    transform:translateY(30px);
    transition:1.2s ease;
}

.fade.visible { opacity:1; transform:translateY(0); }

.text-block {
    max-width: 500px;
    font-size:18px;
    line-height:1.7;
}

.location { margin-top:40px; font-size:18px; }

.map-btn {
    margin-top:20px;
    padding:12px 30px;
    border:none;
    background:white;
    color:#333;
    text-decoration:none;
    font-size:14px;
    letter-spacing:2px;
    transition:0.4s;
}

.map-btn:hover { background:#333; color:white; }

.timer {
    margin-top:40px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

.time-box {
    padding:15px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    min-width:80px;
    border-radius:8px;
}

.time-box span { display:block; font-size:24px; font-weight:500; }

.music-btn {
    position: fixed;
    top:20px;
    right:20px;
    background: rgba(255,255,255,0.3);
    border:none;
    padding:10px 15px;
    cursor:pointer;
    color:white;
    z-index:100;
}

@media (min-width:768px){ .names{ font-size:70px; } }
</style>
</head>

<body>

<!-- Кнопка для фоновой музыки -->
<button class="music-btn" onclick="toggleMusic()">♫</button>
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Первый экран -->
<div class="section">
    <div class="names">РУСЛАН<br>&<br>ЭЛЬВИНА</div>
    <div class="date">26 АПРЕЛЯ 2026</div>
    <button class="button" onclick="document.querySelector('#info').scrollIntoView({behavior:'smooth'})">ОТКРЫТЬ ПРИГЛАШЕНИЕ</button>
</div>

<!-- Основной экран -->
<div class="section fade" id="info">
    <div class="text-block">
        Мы решили связать наши судьбы и стать одной семьёй.<br>
        Будем счастливы, если вы разделите с нами этот особенный день.
    </div>

    <div class="location">
        Ресторан OqSaroy<br>
        г. Ангрен<br>
        Начало в 17:00
    </div>

    <a class="map-btn" href="https://www.google.com/maps?q=40.99947924868695,70.07479626158064" target="_blank">ОТКРЫТЬ ЛОКАЦИЮ</a>

    <div class="timer" id="timer"></div>

    <div style="margin-top:60px; font-size:14px;">С любовью, Руслан & Эльвина</div>
</div>

<script>
// Анимация появления при скролле
const fadeElements = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
    fadeElements.forEach(el => {
        const rect = el.getBoundingClientRect();
        if(rect.top < window.innerHeight - 100){ el.classList.add('visible'); }
    });
});

// Таймер обратного отсчёта
const weddingDate = new Date("April 26, 2026 17:00:00").getTime();
const timer = document.getElementById("timer");
setInterval(() => {
    const now = new Date().getTime();
    const distance = weddingDate - now;
    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance/(1000*60*60))%24);
    const minutes = Math.floor((distance/(1000*60))%60);
    timer.innerHTML = `
        <div class="time-box"><span>${days}</span>дней</div>
        <div class="time-box"><span>${hours}</span>часов</div>
        <div class="time-box"><span>${minutes}</span>минут</div>
    `;
},1000);

// Фоновая музыка
const music = document.getElementById("bgMusic");
function toggleMusic(){ music.paused ? music.play() : music.pause(); }

// Авто-включение при первом клике (iOS)
window.addEventListener('click', ()=>{ music.play().catch(()=>{}); }, {once:true});
</script>

</body>
</html>
