<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>
    html {
        background: radial-gradient(circle at center, #f2ebe3, #e6ddd3, #d9cfc2, #cfc4b8);
    }
    body {
        margin: 0;
        font-family: 'Cormorant Garamond', serif;
        color: #6b5b4d;
        text-align: center;
        overflow-x: hidden;
        position: relative;
        background: inherit;
    }
    /* Фоновая анимация света */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
            radial-gradient(circle at 30% 30%, rgba(255,240,220,0.4), transparent 60%),
            radial-gradient(circle at 70% 70%, rgba(201,169,106,0.25), transparent 60%);
        animation: floatBg 18s ease-in-out infinite;
        z-index: 0;
        pointer-events: none;
    }
    @keyframes floatBg { 50% { transform: translateY(-20px); } }

    /* Контейнеры */
    .section {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
        z-index: 1;
    }
    /* Glass effect for hero and info */
    .section.hero, #info {
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.4);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.6), 0 0 30px rgba(201,169,106,0.15);
        width: 100%;
        max-width: 480px;
        margin: 20px auto;
        padding: 28px 20px;
    }

    /* Arc decorations */
    .arc {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.4;
        z-index: 2;
    }
    .arc svg { width: 100%; height: 100%; }
    .arc path { fill: none; stroke: rgba(201,169,106,0.6); stroke-width: 2; }

    /* Имена */
    .names {
        font-family: 'Playfair Display', serif;
        font-size: 34px;
        letter-spacing: 4px;
        background: linear-gradient(90deg, #bfa37a, #fff6e8, #bfa37a);
        background-size: 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: gold 10s linear infinite;
        /* FIX: static blur for names */
        filter: blur(0.3px);
        /* soft glow */
        text-shadow: 0 0 10px rgba(201,169,106,0.3);
        z-index: 3;
    }
    @keyframes gold { to { background-position: 200%; } }

    .date {
        margin-top: 10px;
        font-size: 16px;
        letter-spacing: 2px;
        color: #bfa37a;
    }
    .button {
        margin-top: 18px;
        padding: 12px 30px;
        border: 1px solid #bfa37a;
        background: transparent;
        color: #bfa37a;
        border-radius: 6px;
        cursor: pointer;
    }
    .button:focus { outline: 2px solid #c9a96a; }

    /* Fade-in on scroll */
    .fade {
        opacity: 0;
        transform: translateY(30px);
        transition: 0.8s;
    }
    .fade.visible {
        opacity: 1;
        transform: none;
    }

    /* Текст */
    .text-block {
        font-size: 18px;
        line-height: 1.6;
        color: #7a6a5c;
    }
    .location {
        margin-top: 18px;
        font-size: 16px;
        color: #7a6a5c;
    }
    /* Map buttons */
    .map-btn {
        display: inline-block;
        margin: 6px 4px;
        padding: 8px 14px;
        background: #c9a96a;
        color: #fff;
        text-decoration: none;
        border-radius: 6px;
        font-size: 12px;
    }

    /* Flip timer */
    .timer {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 12px;
    }
    .time-block {
        text-align: center;
    }
    .time-block span {
        display: block;
        margin-top: 6px;
        font-size: 10px;
        letter-spacing: 2px;
        color: #bfa37a;
    }
    .flip {
        position: relative;
        width: 60px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-family: 'Playfair Display', serif;
        color: #c9a96a;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(201,169,106,0.3);
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15),
                    inset 0 1px 0 rgba(255,255,255,0.6),
                    0 0 20px rgba(201,169,106,0.15);
        transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .flip.animate {
        transform: rotateX(360deg);
        box-shadow: 0 12px 25px rgba(0,0,0,0.2),
                    0 0 25px rgba(201,169,106,0.25);
    }

    @media (min-width: 768px) {
        .names { font-size: 56px; letter-spacing: 8px; }
        .text-block { font-size: 20px; }
        .section.hero, #info { max-width: 700px; }
        .flip { width: 70px; height: 60px; font-size: 32px; }
    }
</style>
